; ============================================================
; Yaf 应用主配置文件
; 通过 Yaf_Application 加载：new Yaf_Application(APP_PATH . "/conf/application.ini", "develop")
; ============================================================

; ── 公共配置（所有环境继承） ───────────────────────────────────
[common]

; Yaf 框架基础
application.directory = APP_PATH "/application"
application.ext       = "php"
application.bootstrap = APP_PATH "/application/Bootstrap.php"
application.library   = APP_PATH "/application/library"
application.modules   = "Index,Admin"

; 时区
application.timezone  = "Asia/Shanghai"

; 日志
application.log.dir   = APP_PATH "/logs"
application.log.level = "info"

; ── 内容审核服务配置 ───────────────────────────────────────────
; endpoint    go-server 审核服务地址（https://ai.a889.cloud），PHP 向此地址发送审核请求
; api_key     在 go-server 管理后台（ai.a889.cloud）创建项目后生成的 Key，用于 X-Project-Key 鉴权
; timeout     调用审核接口的超时秒数，建议 5～10
; async       是否异步审核（false=同步等待结果，true=立即返回task_id由webhook回调）
; webhook_url 本项目的回调接收地址，go-server 审核完成后 POST 到此地址推送结果
;             开发：http://91pa.test/api.php/moderation/callback
;             生产：https://dx-075-api1.ympxbys.xyz/api.php/moderation/callback
; strictness  审核严格度：standard（默认）| strict | loose
[common.moderation]
endpoint    = "https://ai.a889.cloud"
api_key     = "51dm_ghi789"
timeout     = 5
async       = false
webhook_url = ""
strictness  = "standard"

; ── 开发环境（继承 common） ────────────────────────────────────
[develop : common]
application.log.level = "debug"

[develop.moderation]
endpoint    = "https://ai.a889.cloud"
api_key     = "51dm_ghi789"
timeout     = 10
async       = false
webhook_url = "http://91pa.test/api.php/moderation/callback"
strictness  = "standard"

; ── 测试环境（继承 common） ────────────────────────────────────
[test : common]

[test.moderation]
