<!-- 管理后台审核记录列表模板示例 -->
<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>内容ID</th>
      <th>类型</th>
      <th>状态</th>
      <th>违规类型</th>
      <th>创建时间</th>
      <th>操作</th>
    </tr>
  </thead>
  <tbody>
    <!-- {foreach $logs as $log} -->
    <tr>
      <td>{$log.id}</td>
      <td>{$log.content_id}</td>
      <td>{$log.content_type}</td>
      <td>{$log.status}</td>
      <td>{$log.violation_type}</td>
      <td>{$log.created_at}</td>
      <td><a href="/admin/moderation-logs/detail?id={$log.id}">详情</a></td>
    </tr>
    <!-- {/foreach} -->
  </tbody>
</table>
