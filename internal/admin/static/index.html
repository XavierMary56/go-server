<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>审核服务管理后台</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }

  /* ── 登录页 ── */
  #login-page {
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  }
  .login-box {
    background: #fff; border-radius: 16px; padding: 48px 40px; width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .login-logo .icon { font-size: 48px; }
  .login-logo h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-top: 12px; }
  .login-logo p { font-size: 13px; color: #888; margin-top: 4px; }
  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 8px; }
  .form-group input {
    width: 100%; padding: 12px 16px; border: 1.5px solid #e0e0e0; border-radius: 8px;
    font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: #4f46e5; }
  .btn-login {
    width: 100%; padding: 13px; background: #4f46e5; color: #fff; border: none;
    border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s;
  }
  .btn-login:hover { background: #4338ca; }
  .btn-login:disabled { background: #a5b4fc; cursor: not-allowed; }
  .login-error {
    background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
    padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none;
  }

  /* ── 主界面 ── */
  #dashboard { display: none; }
  .topbar {
    background: #1a1a2e; color: #fff; padding: 0 32px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .topbar-brand { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 700; }
  .topbar-brand .dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .topbar-user { font-size: 13px; color: #94a3b8; }
  .btn-logout {
    padding: 6px 16px; background: transparent; color: #94a3b8; border: 1px solid #334155;
    border-radius: 6px; font-size: 13px; cursor: pointer; transition: all 0.2s;
  }
  .btn-logout:hover { background: #334155; color: #fff; }

  .main-content { max-width: 1100px; margin: 32px auto; padding: 0 24px; }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 4px; margin-bottom: 24px; background: #fff; padding: 6px; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); width: fit-content; }
  .tab-btn {
    padding: 8px 24px; border: none; background: transparent; border-radius: 7px;
    font-size: 14px; font-weight: 500; color: #64748b; cursor: pointer; transition: all 0.2s;
  }
  .tab-btn.active { background: #4f46e5; color: #fff; }
  .tab-btn:hover:not(.active) { background: #f1f5f9; color: #1a1a2e; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Card ── */
  .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden; }
  .card-header {
    padding: 20px 24px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid #f1f5f9;
  }
  .card-header h2 { font-size: 16px; font-weight: 700; color: #1a1a2e; }
  .card-header span { font-size: 13px; color: #94a3b8; }

  /* ── 添加表单 ── */
  .add-form {
    padding: 20px 24px; background: #f8fafc; border-bottom: 1px solid #f1f5f9; display: none;
  }
  .add-form.show { display: block; }
  .add-form-title { font-size: 14px; font-weight: 600; color: #334155; margin-bottom: 16px; }
  .add-form-grid { display: grid; grid-template-columns: 1fr 1fr 160px; gap: 12px; align-items: end; }
  .add-form-grid .form-group { margin-bottom: 0; }
  .add-form-grid label { font-size: 12px; font-weight: 600; color: #64748b; margin-bottom: 6px; }
  .add-form-grid input {
    width: 100%; padding: 9px 12px; border: 1.5px solid #e2e8f0; border-radius: 7px;
    font-size: 13px; outline: none; transition: border-color 0.2s;
  }
  .add-form-grid input:focus { border-color: #4f46e5; }
  .add-form-actions { display: flex; gap: 8px; margin-top: 16px; }

  /* ── Buttons ── */
  .btn {
    padding: 8px 18px; border: none; border-radius: 7px; font-size: 13px;
    font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: #4f46e5; color: #fff; }
  .btn-primary:hover { background: #4338ca; }
  .btn-success { background: #22c55e; color: #fff; }
  .btn-success:hover { background: #16a34a; }
  .btn-danger { background: #ef4444; color: #fff; }
  .btn-danger:hover { background: #dc2626; }
  .btn-warning { background: #f59e0b; color: #fff; }
  .btn-warning:hover { background: #d97706; }
  .btn-ghost { background: transparent; color: #64748b; border: 1px solid #e2e8f0; }
  .btn-ghost:hover { background: #f1f5f9; }
  .btn-sm { padding: 5px 12px; font-size: 12px; }

  /* ── Table ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: #f8fafc; }
  th { padding: 12px 16px; text-align: left; font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
  td { padding: 14px 16px; border-top: 1px solid #f1f5f9; color: #334155; }
  tr:hover td { background: #fafbff; }
  .key-cell { font-family: monospace; font-size: 12px; color: #7c3aed; background: #f5f3ff; padding: 3px 8px; border-radius: 4px; }
  .badge {
    display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px;
    border-radius: 20px; font-size: 12px; font-weight: 600;
  }
  .badge-active { background: #dcfce7; color: #166534; }
  .badge-inactive { background: #f1f5f9; color: #64748b; }
  .actions { display: flex; gap: 6px; }
  .empty-row td { text-align: center; padding: 48px 16px; color: #94a3b8; }

  /* ── Stats cards ── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: #fff; border-radius: 12px; padding: 20px 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .stat-card .label { font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .stat-card .value { font-size: 28px; font-weight: 700; color: #1a1a2e; }
  .stat-card .sub { font-size: 12px; color: #94a3b8; margin-top: 4px; }

  /* ── Toast ── */
  .toast-wrap { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    padding: 12px 20px; border-radius: 8px; font-size: 13px; font-weight: 500;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15); animation: slideIn 0.2s ease;
    max-width: 320px;
  }
  .toast-success { background: #22c55e; color: #fff; }
  .toast-error { background: #ef4444; color: #fff; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

  /* ── Loading ── */
  .loading { text-align: center; padding: 48px; color: #94a3b8; font-size: 14px; }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #e2e8f0; border-top-color: #4f46e5; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Modal ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 12px; padding: 32px; width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
  .modal p { font-size: 14px; color: #64748b; margin-bottom: 24px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
</style>
</head>
<body>

<!-- 登录页 -->
<div id="login-page">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">🛡️</div>
      <h1>审核服务管理后台</h1>
      <p>Content Moderation Admin</p>
    </div>
    <div class="login-error" id="login-error"></div>
    <div class="form-group">
      <label>Admin Token</label>
      <input type="password" id="token-input" placeholder="请输入管理员令牌" />
    </div>
    <button class="btn-login" id="login-btn" onclick="login()">登 录</button>
  </div>
</div>

<!-- 主界面 -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-brand">
      <span>🛡️</span>
      <span>审核服务管理后台</span>
      <div class="dot"></div>
    </div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbar-host"></span>
      <button class="btn-logout" onclick="logout()">退出登录</button>
    </div>
  </div>

  <div class="main-content">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('keys', this)">🔑 密钥管理</button>
      <button class="tab-btn" onclick="switchTab('stats', this)">📊 项目统计</button>
    </div>

    <!-- 密钥管理 -->
    <div id="tab-keys" class="tab-panel active">
      <div class="card">
        <div class="card-header">
          <div>
            <h2>项目密钥管理</h2>
            <span id="keys-count">加载中...</span>
          </div>
          <button class="btn btn-primary" onclick="toggleAddForm()">＋ 添加密钥</button>
        </div>

        <!-- 添加表单 -->
        <div class="add-form" id="add-form">
          <div class="add-form-title">添加新项目密钥</div>
          <div class="add-form-grid">
            <div class="form-group">
              <label>项目 ID</label>
              <input type="text" id="new-project-id" placeholder="如：forum_service" />
            </div>
            <div class="form-group">
              <label>密钥（Key）</label>
              <input type="text" id="new-key" placeholder="如：sk-proj-xxxxx" />
            </div>
            <div class="form-group">
              <label>速率限制（次/分钟）</label>
              <input type="number" id="new-rate" placeholder="60" min="1" />
            </div>
          </div>
          <div class="add-form-actions">
            <button class="btn btn-primary" onclick="addKey()">确认添加</button>
            <button class="btn btn-ghost" onclick="toggleAddForm()">取消</button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>项目 ID</th>
                <th>密钥</th>
                <th>速率限制</th>
                <th>创建时间</th>
                <th>状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="keys-table-body">
              <tr class="empty-row"><td colspan="6"><span class="spinner"></span> 加载中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 项目统计 -->
    <div id="tab-stats" class="tab-panel">
      <div class="stats-grid" id="stats-summary"></div>
      <div class="card">
        <div class="card-header">
          <h2>项目详细统计</h2>
          <button class="btn btn-ghost btn-sm" onclick="loadStats()">↻ 刷新</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>项目 ID</th>
                <th>API 调用</th>
                <th>认证次数</th>
                <th>限流次数</th>
                <th>错误次数</th>
                <th>日志大小</th>
              </tr>
            </thead>
            <tbody id="stats-table-body">
              <tr class="empty-row"><td colspan="6">请切换到此标签查看统计</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-wrap" id="toast-wrap"></div>

<!-- 确认删除 Modal -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <h3>⚠️ 确认删除</h3>
    <p id="delete-modal-msg">确定要删除此密钥吗？此操作不可恢复。</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeDeleteModal()">取消</button>
      <button class="btn btn-danger" id="delete-confirm-btn">确认删除</button>
    </div>
  </div>
</div>

<script>
// ── 状态 ──────────────────────────────────────────────
let keysData = {}; // { maskedKey -> KeyInfo }

// ── 工具函数 ──────────────────────────────────────────
function getToken() { return sessionStorage.getItem('adminToken'); }

async function api(method, path, body) {
  const opts = {
    method,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + getToken()
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const resp = await fetch(path, opts);
  if (resp.status === 401) { logout(); return null; }
  return resp;
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function formatDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleDateString('zh-CN') + ' ' + d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

function formatBytes(bytes) {
  if (!bytes) return '0 B';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(1) + ' MB';
}

// ── 登录 ──────────────────────────────────────────────
document.getElementById('token-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

async function login() {
  const token = document.getElementById('token-input').value.trim();
  if (!token) { showLoginError('请输入 Admin Token'); return; }

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = '验证中...';

  try {
    const resp = await fetch('/v1/admin/keys', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (resp.ok) {
      sessionStorage.setItem('adminToken', token);
      showDashboard();
    } else {
      showLoginError('Token 无效，请检查配置');
    }
  } catch (e) {
    showLoginError('连接失败，请检查服务状态');
  } finally {
    btn.disabled = false;
    btn.textContent = '登 录';
  }
}

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.style.display = 'block';
}

function logout() {
  sessionStorage.removeItem('adminToken');
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('token-input').value = '';
  document.getElementById('login-error').style.display = 'none';
}

function showDashboard() {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('topbar-host').textContent = window.location.host;
  loadKeys();
}

// ── Tabs ──────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'stats') loadStats();
}

// ── 密钥管理 ──────────────────────────────────────────
async function loadKeys() {
  const resp = await api('GET', '/v1/admin/keys');
  if (!resp) return;
  const json = await resp.json();
  keysData = json.data || {};
  renderKeys();
}

function renderKeys() {
  const tbody = document.getElementById('keys-table-body');
  const count = Object.keys(keysData).length;
  document.getElementById('keys-count').textContent = `共 ${count} 个密钥`;

  if (count === 0) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">暂无密钥，点击右上角"添加密钥"创建</td></tr>';
    return;
  }

  tbody.innerHTML = Object.entries(keysData).map(([maskedKey, info]) => `
    <tr>
      <td><strong>${info.project_id || '-'}</strong></td>
      <td><span class="key-cell">${info.key || maskedKey}</span></td>
      <td>${info.rate_limit ? info.rate_limit + ' 次/分钟' : '无限制'}</td>
      <td>${formatDate(info.created_at)}</td>
      <td>
        <span class="badge ${info.enabled ? 'badge-active' : 'badge-inactive'}">
          ${info.enabled ? '● 启用' : '○ 停用'}
        </span>
      </td>
      <td>
        <div class="actions">
          <button class="btn btn-sm ${info.enabled ? 'btn-warning' : 'btn-success'}"
            onclick="toggleKey('${encodeURIComponent(info.key || maskedKey)}', ${!info.enabled})">
            ${info.enabled ? '停用' : '启用'}
          </button>
          <button class="btn btn-sm btn-danger"
            onclick="confirmDelete('${encodeURIComponent(info.key || maskedKey)}', '${info.project_id}')">
            删除
          </button>
        </div>
      </td>
    </tr>
  `).join('');
}

function toggleAddForm() {
  const form = document.getElementById('add-form');
  form.classList.toggle('show');
  if (form.classList.contains('show')) {
    document.getElementById('new-project-id').focus();
  }
}

async function addKey() {
  const projectId = document.getElementById('new-project-id').value.trim();
  const key = document.getElementById('new-key').value.trim();
  const rate = parseInt(document.getElementById('new-rate').value) || 0;

  if (!projectId || !key) { toast('项目 ID 和密钥不能为空', 'error'); return; }
  if (rate <= 0) { toast('速率限制必须大于 0', 'error'); return; }

  const resp = await api('POST', '/v1/admin/keys', { project_id: projectId, key, rate_limit: rate });
  if (!resp) return;

  if (resp.status === 201) {
    toast(`密钥已添加：${projectId}`);
    document.getElementById('new-project-id').value = '';
    document.getElementById('new-key').value = '';
    document.getElementById('new-rate').value = '';
    document.getElementById('add-form').classList.remove('show');
    loadKeys();
  } else {
    const json = await resp.json();
    toast(json.error || '添加失败', 'error');
  }
}

async function toggleKey(encodedKey, enable) {
  const key = decodeURIComponent(encodedKey);
  const resp = await api('PUT', '/v1/admin/keys/' + encodedKey, { enabled: enable });
  if (!resp) return;

  if (resp.ok) {
    toast(enable ? '密钥已启用' : '密钥已停用');
    loadKeys();
  } else {
    const json = await resp.json();
    toast(json.error || '操作失败', 'error');
  }
}

let pendingDeleteKey = null;

function confirmDelete(encodedKey, projectId) {
  pendingDeleteKey = encodedKey;
  document.getElementById('delete-modal-msg').textContent =
    `确定要删除项目 "${projectId}" 的密钥吗？此操作不可恢复。`;
  document.getElementById('delete-modal').classList.add('show');
  document.getElementById('delete-confirm-btn').onclick = doDelete;
}

function closeDeleteModal() {
  document.getElementById('delete-modal').classList.remove('show');
  pendingDeleteKey = null;
}

async function doDelete() {
  if (!pendingDeleteKey) return;
  closeDeleteModal();

  const resp = await api('DELETE', '/v1/admin/keys/' + pendingDeleteKey);
  if (!resp) return;

  if (resp.ok) {
    toast('密钥已删除');
    loadKeys();
  } else {
    const json = await resp.json();
    toast(json.error || '删除失败', 'error');
  }
}

// ── 项目统计 ──────────────────────────────────────────
async function loadStats() {
  document.getElementById('stats-table-body').innerHTML =
    '<tr class="empty-row"><td colspan="6"><span class="spinner"></span> 加载中...</td></tr>';

  const [statsResp, projResp] = await Promise.all([
    api('GET', '/v1/admin/projects/stats'),
    api('GET', '/v1/admin/projects')
  ]);
  if (!statsResp || !projResp) return;

  const statsJson = await statsResp.json();
  const projJson = await projResp.json();

  const stats = statsJson.data || {};
  const projects = projJson.data || {};

  // 汇总卡片
  let totalCalls = 0, totalAuth = 0, totalLimit = 0;
  Object.values(stats).forEach(s => {
    totalCalls += s.api_calls || 0;
    totalAuth += s.auth_attempts || 0;
    totalLimit += s.rate_limited || 0;
  });

  document.getElementById('stats-summary').innerHTML = `
    <div class="stat-card">
      <div class="label">项目总数</div>
      <div class="value">${Object.keys(projects).length}</div>
      <div class="sub">活跃项目</div>
    </div>
    <div class="stat-card">
      <div class="label">API 调用总量</div>
      <div class="value">${totalCalls.toLocaleString()}</div>
      <div class="sub">累计请求次数</div>
    </div>
    <div class="stat-card">
      <div class="label">认证次数</div>
      <div class="value">${totalAuth.toLocaleString()}</div>
      <div class="sub">鉴权请求总量</div>
    </div>
    <div class="stat-card">
      <div class="label">限流次数</div>
      <div class="value">${totalLimit.toLocaleString()}</div>
      <div class="sub">触发速率限制</div>
    </div>
  `;

  const tbody = document.getElementById('stats-table-body');
  const entries = Object.entries(stats);

  if (entries.length === 0) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">暂无统计数据</td></tr>';
    return;
  }

  tbody.innerHTML = entries.map(([projectId, s]) => `
    <tr>
      <td><strong>${projectId}</strong></td>
      <td>${(s.api_calls || 0).toLocaleString()}</td>
      <td>${(s.auth_attempts || 0).toLocaleString()}</td>
      <td>${(s.rate_limited || 0).toLocaleString()}</td>
      <td>${(s.errors || 0).toLocaleString()}</td>
      <td>${formatBytes(s.log_size || 0)}</td>
    </tr>
  `).join('');
}

// ── 初始化 ──────────────────────────────────────────
window.onload = function() {
  const token = getToken();
  if (token) {
    showDashboard();
  }
};
</script>
</body>
</html>
