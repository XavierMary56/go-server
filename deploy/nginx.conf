##############################################################
# Nginx 反向代理配置 — Go 审核服务
# 文件路径：/etc/nginx/conf.d/moderation.conf
##############################################################

upstream moderation_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen      80;
    listen      [::]:80;
    server_name mod.your-company.com;   # ← 改成你的域名或内网 IP

    # 安全头
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         DENY;
    add_header X-XSS-Protection        "1; mode=block";

    access_log /var/log/nginx/moderation_access.log;
    error_log  /var/log/nginx/moderation_error.log;

    location / {
        proxy_pass         http://moderation_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}

# 启用 HTTPS：certbot --nginx -d mod.your-company.com
