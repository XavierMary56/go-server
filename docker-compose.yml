services:
  mariadb:
    image: mariadb:11
    container_name: moderation-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: moderation
      MYSQL_USER: moderation
      MYSQL_PASSWORD: moderation123
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./deploy/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - moderation-net

  moderation:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moderation-server
    restart: unless-stopped
    ports:
      - "888:8080"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PORT=8080
      - APP_ENV=production
      - LOG_LEVEL=info
      - LOG_DIR=/logs
      - CACHE_DRIVER=redis
      - CACHE_TTL=60
      - REDIS_ADDR=redis:6379
      - REDIS_PREFIX=mod
      - ENABLE_AUTH=${ENABLE_AUTH:-false}
      - ALLOWED_KEYS=${ALLOWED_KEYS}
      - ENABLE_ADMIN_API=${ENABLE_ADMIN_API:-true}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - ENABLE_AUDIT=${ENABLE_AUDIT:-true}
      - AUDIT_LOG_DIR=${AUDIT_LOG_DIR:-/logs/audit}
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_USER=moderation
      - DB_PASS=moderation123
      - DB_NAME=moderation
    volumes:
      - ./logs:/logs
      - moderation-data:/data
      - ./internal/admin/static:/admin-static:ro
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - moderation-net

  redis:
    image: redis:7-alpine
    container_name: moderation-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - moderation-net

volumes:
  redis-data:
  moderation-data:
  mariadb-data:

networks:
  moderation-net:
    driver: bridge
