version: "3.9"

services:
  # ── 审核服务 ──────────────────────────────────────────────
  moderation:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moderation-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # ⚠ 必填：你的 Anthropic API Key
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # 服务配置
      - PORT=8080
      - APP_ENV=production
      - LOG_LEVEL=info
      - LOG_DIR=/logs
      # 缓存（使用 Redis）
      - CACHE_DRIVER=redis
      - CACHE_TTL=60
      - REDIS_ADDR=redis:6379
      - REDIS_PREFIX=mod:
      # 鉴权（改为 true 后需要传 X-Project-Key 请求头）
      - ENABLE_AUTH=false
      # 各项目密钥（逗号分隔）
      # - ALLOWED_KEYS=proj_forum_a_k3j9x,proj_bbs_b_p8q4w
    volumes:
      - ./logs:/logs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - moderation-net

  # ── Redis 缓存 ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: moderation-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - moderation-net

volumes:
  redis-data:

networks:
  moderation-net:
    driver: bridge
